name: Changelog Generator

on:
  push:
    branches: 
        - release/**
        - testRelease/**
  workflow_dispatch:

jobs:
  generate-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate changelog
        run: |
          DATE=$(date +'%Y-%m-%d')
          TEMP_FILE=$(mktemp)

          echo "# Changelog" > $TEMP_FILE
          echo "" >> $TEMP_FILE
          echo "## In Dev : $DATE" >> $TEMP_FILE
          echo "" >> $TEMP_FILE

          # Feature section
          echo "Feature :" >> $TEMP_FILE
          git log --pretty=format:"- %s (%an)" --no-merges -n 50 | grep -i "^-[ ]*feat" || echo "- _No new features_" >> $TEMP_FILE
          echo "" >> $TEMP_FILE

          # Fix section
          echo "Fix :" >> $TEMP_FILE
          git log --pretty=format:"- %s (%an)" --no-merges -n 50 | grep -i "^-[ ]*fix" || echo "- _No fixes_" >> $TEMP_FILE
          echo "" >> $TEMP_FILE

          # Other section
          echo "Other :" >> $TEMP_FILE
          git log --pretty=format:"- %s (%an)" --no-merges -n 50 | grep -viE "^-[ ]*(feat|fix)" || echo "- _No other changes_" >> $TEMP_FILE
          echo "" >> $TEMP_FILE

          # Append previous changelog if it exists
          if [ -f CHANGELOG.md ]; then
            tail -n +2 CHANGELOG.md >> $TEMP_FILE
          fi

          mv $TEMP_FILE CHANGELOG.md

      - name: Commit and push changelog
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update changelog"
          git push
