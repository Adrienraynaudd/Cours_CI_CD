name: Changelog Generator

on:
  push:
    branches: 
        - release/**
        - testRelease/**
  workflow_dispatch:

jobs:
  generate-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate or update In Dev section
        run: |
          DATE=$(date +'%Y-%m-%d')
          TMP_SECTION=$(mktemp)
          TMP_CHANGELOG=$(mktemp)

          # Collect commits
          COMMITS=$(git log --pretty=format:"- %s (%an)" --no-merges -n 50)

          # Categorize commits
          echo "Feature :" > $TMP_SECTION
          echo "$COMMITS" | grep -i "^-[ ]*feat" || echo "- _No new features_" >> $TMP_SECTION
          echo "" >> $TMP_SECTION

          echo "Fix :" >> $TMP_SECTION
          echo "$COMMITS" | grep -i "^-[ ]*fix" || echo "- _No fixes_" >> $TMP_SECTION
          echo "" >> $TMP_SECTION

          echo "Other :" >> $TMP_SECTION
          echo "$COMMITS" | grep -viE "^-[ ]*(feat|fix)" || echo "- _No other changes_" >> $TMP_SECTION
          echo "" >> $TMP_SECTION

          # Create changelog if missing
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
          fi

          # Check for existing 'In Dev' section
          if grep -q "## In Dev" CHANGELOG.md; then
            # Insert under existing 'In Dev' (after its header)
            awk -v new="$(
              cat $TMP_SECTION | sed 's/\\/\\\\/g; s/&/\\&/g'
            )" '
              BEGIN { inserted=0 }
              /^## In Dev/ {
                print
                print ""
                print new
                inserted=1
                next
              }
              { print }
            ' CHANGELOG.md > $TMP_CHANGELOG
          else
            # Prepend new section to top
            echo "# Changelog" > $TMP_CHANGELOG
            echo "" >> $TMP_CHANGELOG
            echo "## In Dev" >> $TMP_CHANGELOG
            echo "" >> $TMP_CHANGELOG
            cat $TMP_SECTION >> $TMP_CHANGELOG
            echo "" >> $TMP_CHANGELOG
            tail -n +2 CHANGELOG.md >> $TMP_CHANGELOG
          fi

          mv $TMP_CHANGELOG CHANGELOG.md

      - name: Commit and push changelog
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update changelog"
          git push
