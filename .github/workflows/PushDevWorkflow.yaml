name: Changelog Generator

on:
  push:
    branches: 
        - release/**
        - testRelease/**
  workflow_dispatch:

jobs:
  generate-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate or update changelog
        run: |
          TMP_FILE=$(mktemp)
          COMMITS=$(git log --pretty=format:"- %s (%an)" --no-merges -n 50)

          # Ensure changelog file exists
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
          fi

          # Extract already logged lines (to avoid duplication)
          EXISTING_LINES=$(grep '^-' CHANGELOG.md || true)

          # Filter and deduplicate new commits
          echo "$COMMITS" | grep -i '^-[ ]*feat' | grep -vFf <(echo "$EXISTING_LINES") > features.txt || true
          echo "$COMMITS" | grep -i '^-[ ]*fix'  | grep -vFf <(echo "$EXISTING_LINES") > fixes.txt || true
          echo "$COMMITS" | grep -viE '^- (feat|fix)' | grep -vFf <(echo "$EXISTING_LINES") > others.txt || true

          HAS_FEATURES=$(wc -l < features.txt)
          HAS_FIXES=$(wc -l < fixes.txt)
          HAS_OTHERS=$(wc -l < others.txt)

          if grep -q "## In Dev" CHANGELOG.md; then
            cp CHANGELOG.md $TMP_FILE

            # Insert new lines into each section if they exist
            if [ "$HAS_FEATURES" -gt 0 ]; then
              awk -v new="$(cat features.txt)" '
                BEGIN { done=0 }
                /^Feature[ ]*:/ {
                  print
                  print new
                  done=1
                  next
                }
                { print }
              ' $TMP_FILE > tmp && mv tmp $TMP_FILE
            fi

            if [ "$HAS_FIXES" -gt 0 ]; then
              awk -v new="$(cat fixes.txt)" '
                BEGIN { done=0 }
                /^Fix[ ]*:/ {
                  print
                  print new
                  done=1
                  next
                }
                { print }
              ' $TMP_FILE > tmp && mv tmp $TMP_FILE
            fi

            if [ "$HAS_OTHERS" -gt 0 ]; then
              awk -v new="$(cat others.txt)" '
                BEGIN { done=0 }
                /^Other[ ]*:/ {
                  print
                  print new
                  done=1
                  next
                }
                { print }
              ' $TMP_FILE > tmp && mv tmp $TMP_FILE
            fi

            mv $TMP_FILE CHANGELOG.md

          else
            # Prepend full In Dev section if not exists
            echo "# Changelog" > $TMP_FILE
            echo "" >> $TMP_FILE
            echo "## In Dev :" >> $TMP_FILE
            echo "" >> $TMP_FILE

            echo "Feature :" >> $TMP_FILE
            if [ "$HAS_FEATURES" -gt 0 ]; then
              cat features.txt >> $TMP_FILE
            else
              echo "- _No new features_" >> $TMP_FILE
            fi
            echo "" >> $TMP_FILE

            echo "Fix :" >> $TMP_FILE
            if [ "$HAS_FIXES" -gt 0 ]; then
              cat fixes.txt >> $TMP_FILE
            else
              echo "- _No fixes_" >> $TMP_FILE
            fi
            echo "" >> $TMP_FILE

            echo "Other :" >> $TMP_FILE
            if [ "$HAS_OTHERS" -gt 0 ]; then
              cat others.txt >> $TMP_FILE
            else
              echo "- _No other changes_" >> $TMP_FILE
            fi
            echo "" >> $TMP_FILE

            # Append previous changelog minus existing title
            tail -n +2 CHANGELOG.md >> $TMP_FILE
            mv $TMP_FILE CHANGELOG.md
          fi

      - name: Commit and push changelog
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update changelog"
          git push
